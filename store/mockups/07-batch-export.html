<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>XClipper — Batch & Fast Batch Export</title>
<style>
  :root {
    --bg: #f3f6fc;
    --ink: #0b1220;
    --ink-2: #475569;
    --ink-3: #94a3b8;
    --line: #e2e8f0;
    --brand: #1d9bf0;
    --brand-hover: #1a8cd8;
    --green: #10b981;
    --red: #dc2626;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    margin: 0;
    padding: 0;
    background: #d9dee5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .canvas {
    width: 1280px;
    height: 800px;
    background: var(--bg);
    background-image:
      radial-gradient(1200px 600px at 50% -120px, #ffffff 0%, rgba(255,255,255,0) 60%),
      radial-gradient(800px 500px at 110% 110%, #e2ebf5 0%, rgba(226,235,245,0) 60%);
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    padding: 0 60px 0 80px;
    overflow: hidden;
    position: relative;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
  }

  /* Left Panel */
  .left-panel {
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    text-align: left;
    z-index: 5;
    flex-shrink: 0;
  }
  .brand-row { display: flex; align-items: center; gap: 16px; }
  .brand-row .wordmark {
    font-size: 42px;
    font-weight: 800;
    color: var(--ink);
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .left-panel h1 {
    font-size: 40px;
    font-weight: 850;
    color: var(--ink);
    line-height: 1.15;
    letter-spacing: -0.03em;
  }
  .left-panel h1 .hot { color: var(--red); }
  .left-panel p {
    font-size: 21px;
    color: var(--ink-2);
    line-height: 1.45;
    font-weight: 400;
  }

  /* Right Panel */
  .right-panel {
    flex: 1;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    height: 100%;
    position: relative;
  }
  .main-demo {
    position: relative;
    width: 420px;
    transform: scale(1.24);
    transform-origin: center right;
  }

  /* Stacked exported files behind the popup — implies a whole batch of output */
  .doc-stack { position: absolute; z-index: 1; }
  .doc {
    position: absolute;
    width: 132px;
    height: 168px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: 0 16px 36px -14px rgba(15, 23, 42, 0.22);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
  }
  .doc .lines {
    position: absolute;
    top: 22px; left: 18px; right: 18px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .doc .lines i { height: 6px; border-radius: 3px; background: #e2e8f0; display: block; }
  .doc .lines i:nth-child(2) { width: 78%; }
  .doc .lines i:nth-child(3) { width: 88%; }
  .doc .ext { font-size: 22px; font-weight: 900; letter-spacing: -0.02em; }
  .doc.d1 { left: -46px; top: 22px; transform: rotate(-9deg); }
  .doc.d2 { left: 8px;  top: 8px;  transform: rotate(-3deg); }
  .doc.d3 { left: 60px; top: 0;    transform: rotate(4deg); opacity: 0.96; }

  /* Popup */
  .popup {
    position: relative;
    z-index: 3;
    margin-left: 96px;
    width: 340px;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 28px 64px -20px rgba(15, 23, 42, 0.30), 0 1px 3px rgba(15, 23, 42, 0.04);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .popup-head { position: relative; display: flex; align-items: center; justify-content: center; }
  .popup-head .brand { display: flex; align-items: center; gap: 9px; }
  .popup-head .brand img { width: 24px; height: 24px; display: block; }
  .popup-head .brand .wm { font-size: 18px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
  .popup-head .gear { position: absolute; right: 0; color: var(--ink-3); }

  .seg { display: flex; align-items: center; background: #f1f5f9; border-radius: 11px; padding: 4px; gap: 4px; }
  .seg .opt { flex: 1; text-align: center; font-size: 13px; font-weight: 700; color: var(--ink-3); padding: 8px 0; border-radius: 8px; }
  .seg .opt.active { background: #ffffff; color: var(--ink); box-shadow: 0 1px 3px rgba(15,23,42,.12); }

  .tabs { display: flex; gap: 8px; }
  .tab {
    flex: 1; height: 44px;
    border: 1px solid var(--line); border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-3);
  }
  .tab svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .tab.active { background: var(--brand); border-color: var(--brand); color: #fff; box-shadow: 0 8px 18px -4px rgba(29,155,240,.45); }

  .fast {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 12px 14px;
    border: 1px solid #fecaca;
    background: linear-gradient(180deg, #fff7f7, #fff);
    border-radius: 12px;
  }
  .fast .fl { display: flex; align-items: center; gap: 9px; }
  .fast .fl svg { width: 18px; height: 18px; fill: var(--red); }
  .fast .fl .lbl { font-size: 15px; font-weight: 700; color: var(--red); }
  .fast .fl .beta { font-size: 10px; font-weight: 800; color: #b91c1c; background: #fee2e2; border-radius: 999px; padding: 2px 7px; letter-spacing: .05em; text-transform: uppercase; }
  .toggle { width: 44px; height: 25px; border-radius: 999px; background: var(--red); position: relative; box-shadow: inset 0 1px 2px rgba(0,0,0,.15); }
  .toggle::after { content: ''; position: absolute; top: 3px; right: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.2); }

  .progress { display: flex; flex-direction: column; gap: 9px; }
  .prow { display: flex; align-items: center; gap: 10px; }
  .ctl { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; color: var(--ink-2); flex-shrink: 0; }
  .ctl svg { width: 13px; height: 13px; fill: currentColor; }
  .bar { flex: 1; height: 10px; border-radius: 999px; background: #eef2f7; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 62%; border-radius: 999px; background: linear-gradient(90deg, var(--brand), #5cc1ff); }
  .plabel { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-2); font-weight: 600; }
  .plabel b { color: var(--ink); }
  .plabel .chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 800; color: var(--red); background: #fee2e2; border-radius: 999px; padding: 2px 8px; }
  .plabel .chip svg { width: 11px; height: 11px; fill: var(--red); }
</style>
</head>
<body>

<div class="canvas" id="canvas">
  <div class="left-panel">
    <div class="brand-row">
      <img src="../../assets/xclipper-mark.svg" width="64" height="64" alt="">
      <div class="wordmark">X<span style="color: var(--brand);">Clipper</span></div>
    </div>
    <h1>Export hundreds<br>at once — up to<br><span class="hot">10× faster</span></h1>
    <p>Batch your Bookmarks, Likes, a profile, your timeline, or a hand-picked selection — with live progress, pause &amp; resume.</p>
  </div>

  <div class="right-panel">
    <div class="main-demo">

      <!-- Stacked output behind the popup -->
      <div class="doc-stack">
        <div class="doc d1"><div class="lines"><i></i><i></i><i></i></div><div class="ext" style="color:#1d9bf0;">.md</div></div>
        <div class="doc d2"><div class="lines"><i></i><i></i><i></i></div><div class="ext" style="color:#dc2626;">.pdf</div></div>
        <div class="doc d3"><div class="lines"><i></i><i></i><i></i></div><div class="ext" style="color:#0f766e;">.csv</div></div>
      </div>

      <!-- Popup -->
      <div class="popup">
        <div class="popup-head">
          <div class="brand">
            <img src="../../assets/xclipper-mark.svg" alt="">
            <span class="wm">X<span style="color: var(--brand);">Clipper</span></span>
          </div>
          <svg class="gear" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>

        <!-- Single / Batch -->
        <div class="seg">
          <div class="opt">Single export</div>
          <div class="opt active">Batch export</div>
        </div>

        <!-- Source tabs -->
        <div class="tabs">
          <div class="tab active" title="Bookmarks"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
          <div class="tab" title="Profile"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <div class="tab" title="Likes"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
          <div class="tab" title="Timeline"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
          <div class="tab" title="Selection"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
        </div>

        <!-- Fast Batch (armed) -->
        <div class="fast">
          <div class="fl">
            <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            <span class="lbl">Fast Batch</span>
            <span class="beta">Beta</span>
          </div>
          <div class="toggle"></div>
        </div>

        <!-- Progress (running) -->
        <div class="progress">
          <div class="prow">
            <div class="ctl"><svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg></div>
            <div class="ctl"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg></div>
            <div class="bar"><i></i></div>
          </div>
          <div class="plabel">
            <span class="chip"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>Fast</span>
            <span>Bookmarks · <b>74</b> / 120 exported</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
